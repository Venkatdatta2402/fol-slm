model:
  encoder_name: "t5-base"          # pretrained T5 encoder (frozen)
  decoder_layers: 6
  decoder_heads: 8
  decoder_dim: 512
  decoder_ff_dim: 2048
  decoder_dropout: 0.1
  max_seq_len: 512

training:
  batch_size: 16
  grad_accum_steps: 4             # effective batch = 64
  learning_rate: 3.0e-4
  warmup_steps: 500
  max_steps: 20000
  fp16: true
  clip_grad_norm: 1.0
  weight_decay: 0.01
  label_smoothing: 0.0
  save_every: 1000
  eval_every: 500
  output_dir: "outputs/"
  resume_from: null

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/dev.jsonl"
  max_input_len: 512
  max_target_len: 512

logging:
  use_wandb: false
  project_name: "fol-slm"
  run_name: null
  log_every: 50

diagnostics:
  enabled: false
  log_cross_attn_entropy: false
  log_grad_norms: false
