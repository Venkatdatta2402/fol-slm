model:
  encoder_name: "t5-base"
  decoder_layers: 6
  decoder_heads: 8
  decoder_dim: 512
  decoder_ff_dim: 2048
  decoder_dropout: 0.1
  max_seq_len: 512

training:
  batch_size: 16
  grad_accum_steps: 4             # effective batch = 64
  learning_rate: 1.0e-4             # conservative for random-init decoder
  warmup_steps: 4000             # standard transformer warmup
  max_steps: 40000
  fp16: false
  bf16: true
  clip_grad_norm: 1.0
  weight_decay: 0.01
  label_smoothing: 0.1
  save_every: 2000
  eval_every: 500
  output_dir: "outputs/phase1_baseline/"
  resume_from: "outputs/phase1_baseline/checkpoint_10000.pt"
  reset_scheduler: true

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/dev.jsonl"
  max_input_len: 256
  max_target_len: 256

logging:
  use_wandb: true
  project_name: "fol-slm"
  run_name: "phase1-baseline"
  log_every: 50

diagnostics:
  enabled: true
  log_cross_attn_entropy: true
  log_grad_norms: true
