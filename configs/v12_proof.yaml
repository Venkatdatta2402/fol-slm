# Phase 2: Train proof decoder only (FOL representations → proof chain)
# Translation decoder is frozen. Proof decoder cross-attends to its hidden states.

model:
  encoder_name: "t5-base"
  max_seq_len: 512
  translation_decoder:
    layers: 4
    heads: 8
    dim: 512
    ff_dim: 2048
    dropout: 0.1
  proof_decoder:
    layers: 4
    heads: 8
    dim: 512
    ff_dim: 2048
    dropout: 0.35

training:
  batch_size: 16
  grad_accum_steps: 4
  learning_rate: 1.9028e-3
  warmup_steps: 4175              # 16.7% of 25k steps
  max_steps: 25000
  bf16: true
  fp16: false
  clip_grad_norm: 1.0
  weight_decay: 3.00e-3
  label_smoothing: 0.05
  save_every: 2000
  eval_every: 1000
  output_dir: "outputs/v12_proof/"
  translation_checkpoint: "outputs/v12_translation_4L512/checkpoint_final.pt"

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/dev.jsonl"
  max_input_len: 512
  max_target_len: 512

curriculum:
  phases:
    - {until_step: 5000, max_qdep: 2}
    - {until_step: 25000, max_qdep: null}

logging:
  use_wandb: true
  project_name: "fol-slm"
  run_name: "v12-phase2-proof"
  log_every: 50
